[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=accounts
    --cov=inventory
    --cov=production
    --cov=specification
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v
