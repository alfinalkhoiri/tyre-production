        name: date
        schema:
          type: string
          format: date
      - in: query
        name: material
        schema:
          type: integer
      - in: path
        name: material_id
        schema:
          type: integer
        description: ID material
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
