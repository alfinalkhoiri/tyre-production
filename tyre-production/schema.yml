      operationId: production_analytics_shift_summary_retrieve
      description: |-
        Rata-rata dan total pemakaian per shift.
        GET /api/analytics/shift-summary/?from=YYYY-MM-DD&to=YYYY-MM-DD
      summary: Rata-rata dan total pemakaian dikelompokkan per shift
      parameters:
      - in: query
        name: from
        schema:
          type: string
          format: date
        description: Tanggal mulai (YYYY-MM-DD)
      - in: query
        name: to
        schema:
          type: string
          format: date
        description: Tanggal akhir (YYYY-MM-DD)
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  date_from:
                    type: string
                    format: date
                  date_to:
                    type: string
                    format: date
                  results:
                    type: array
                    items:
                      type: object
          description: ''
  /api/production/analytics/export/csv/:
    get:
      operationId: production_analytics_export_csv_retrieve
      description: 'Kolom: `date`, `shift`, `order_number`, `material_kode`, `material_name`,
        `unit`, `qty`.'
      summary: Export DailyUsage ke CSV (streaming)
      parameters:
      - in: query
        name: from
        schema:
          type: string
          format: date
        description: Tanggal mulai (YYYY-MM-DD)
      - in: query
        name: material_id
        schema:
          type: integer
        description: Filter material
      - in: query
        name: shift
        schema:
          type: string
          enum:
          - '1'
          - '2'
          - '3'
        description: Filter shift (1/2/3)
      - in: query
        name: to
        schema:
          type: string
          format: date
        description: Tanggal akhir (YYYY-MM-DD)
      tags:
      - Analytics / Export
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            text/csv:
              schema:
                type: string
                format: binary
          description: ''
  /api/production/analytics/export/json/:
    get:
      operationId: production_analytics_export_json_retrieve
      description: Satu JSON object per baris. Langsung bisa di-load dengan `pandas.read_json(...,
        lines=True)`.
      summary: Export DailyUsage ke NDJSON (newline-delimited, untuk ML pipeline)
      parameters:
      - in: query
        name: from
        schema:
          type: string
          format: date
        description: Tanggal mulai (YYYY-MM-DD)
      - in: query
        name: material_id
        schema:
          type: integer
        description: Filter material
      - in: query
        name: shift
        schema:
          type: string
          enum:
          - '1'
          - '2'
          - '3'
        description: Filter shift (1/2/3)
      - in: query
        name: to
        schema:
          type: string
          format: date
        description: Tanggal akhir (YYYY-MM-DD)
      tags:
      - Analytics / Export
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/x-ndjson:
              schema:
                type: string
                format: binary
          description: ''
