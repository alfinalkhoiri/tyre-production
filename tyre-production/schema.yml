  /api/inventory/transactions/:
    post:
      operationId: inventory_transactions_create
      description: '`stock_before` dan `stock_after` dihitung otomatis dari stok material
        saat ini. Tipe `IN` menambah stok, `AUTO` mengurangi stok.'
      summary: Catat transaksi stok
      tags:
      - Inventory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockTransactionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StockTransactionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StockTransactionRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockTransaction'
          description: ''
    get:
      operationId: inventory_transactions_list
      description: 'Filter: `type` (IN/AUTO), `material`, `date`. Terurut terbaru
        lebih dulu.'
      summary: List transaksi stok
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: material
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          enum:
          - AUTO
          - IN
        description: |-
          * `IN` - Penerimaan
          * `AUTO` - Pemakaian Otomatis
      tags:
      - Inventory
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStockTransactionList'
          description: ''
  /api/inventory/transactions/by-material/{material_id}/:
    get:
      operationId: inventory_transactions_by_material_list
      summary: Riwayat transaksi per material
      parameters:
