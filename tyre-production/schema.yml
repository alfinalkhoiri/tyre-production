      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TyreSpecRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TyreSpecRequest'
          multipart/form-data:
            schema:
